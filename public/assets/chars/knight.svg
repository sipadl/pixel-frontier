<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Knight Body -->
  <rect x="10" y="10" width="12" height="14" rx="2" fill="#4a5568"/>
  <!-- Armor plate -->
  <rect x="11" y="12" width="10" height="8" rx="1" fill="#718096"/>
  <rect x="13" y="13" width="6" height="2" fill="#e2e8f0" opacity="0.3"/>
  <!-- Head -->
  <rect x="11" y="4" width="10" height="8" rx="3" fill="#ecc094"/>
  <!-- Helmet -->
  <rect x="10" y="3" width="12" height="5" rx="2" fill="#718096"/>
  <rect x="12" y="3" width="8" height="3" rx="1" fill="#a0aec0"/>
  <!-- Visor -->
  <rect x="12" y="7" width="8" height="2" rx="1" fill="#2d3748"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="1" fill="#fff"/>
  <rect x="17" y="7" width="2" height="1" fill="#fff"/>
  <!-- Shield -->
  <rect x="5" y="12" width="6" height="8" rx="1" fill="#c53030"/>
  <rect x="6" y="13" width="4" height="6" fill="#e53e3e"/>
  <line x1="8" y1="13" x2="8" y2="19" stroke="#fc8181" stroke-width="0.5"/>
  <line x1="6" y1="16" x2="10" y2="16" stroke="#fc8181" stroke-width="0.5"/>
  <!-- Sword -->
  <rect x="21" y="6" width="2" height="14" rx="1" fill="#e2e8f0"/>
  <rect x="20" y="18" width="4" height="2" rx="1" fill="#a0aec0"/>
  <rect x="21" y="20" width="2" height="3" fill="#718096"/>
  <!-- Legs -->
  <rect x="12" y="24" width="4" height="5" rx="1" fill="#4a5568"/>
  <rect x="18" y="24" width="4" height="5" rx="1" fill="#4a5568"/>
  <!-- Boots -->
  <rect x="11" y="27" width="5" height="3" rx="1" fill="#2d3748"/>
  <rect x="18" y="27" width="5" height="3" rx="1" fill="#2d3748"/>
</svg>