<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rogue body — slim -->
  <rect x="11" y="10" width="10" height="13" rx="2" fill="#1a202c"/>
  <rect x="12" y="11" width="8" height="9" rx="1" fill="#2d3748"/>
  <!-- Head -->
  <rect x="12" y="4" width="8" height="8" rx="3" fill="#ecc094"/>
  <!-- Mask -->
  <rect x="11" y="6" width="10" height="3" rx="1" fill="#1a202c"/>
  <!-- Eyes (glowing red) -->
  <rect x="13" y="7" width="2" height="1" fill="#fc8181"/>
  <rect x="17" y="7" width="2" height="1" fill="#fc8181"/>
  <!-- Hood -->
  <rect x="11" y="3" width="10" height="5" rx="3" fill="#1a202c"/>
  <!-- Dual daggers -->
  <rect x="5" y="12" width="1.5" height="8" rx="0.5" fill="#e2e8f0"/>
  <rect x="4.5" y="19" width="2.5" height="2" rx="0.5" fill="#a0aec0"/>
  <rect x="26" y="12" width="1.5" height="8" rx="0.5" fill="#e2e8f0"/>
  <rect x="25.5" y="19" width="2.5" height="2" rx="0.5" fill="#a0aec0"/>
  <!-- Legs -->
  <rect x="12" y="23" width="4" height="5" rx="1" fill="#1a202c"/>
  <rect x="17" y="23" width="4" height="5" rx="1" fill="#1a202c"/>
  <rect x="11" y="26" width="5" height="3" rx="1" fill="#0d1117"/>
  <rect x="17" y="26" width="5" height="3" rx="1" fill="#0d1117"/>
</svg>