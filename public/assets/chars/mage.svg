<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Mage robe -->
  <rect x="10" y="10" width="12" height="14" rx="2" fill="#4a5568"/>
  <rect x="11" y="12" width="10" height="8" rx="1" fill="#805ad5"/>
  <rect x="13" y="13" width="6" height="2" fill="#e2e8f0" opacity="0.2"/>
  <!-- Head -->
  <rect x="11" y="4" width="10" height="8" rx="3" fill="#f5e9c6"/>
  <!-- Hat -->
  <polygon points="11,6 21,6 16,0" fill="#805ad5"/>
  <rect x="14" y="2" width="4" height="3" fill="#d6bcfa"/>
  <!-- Staff -->
  <rect x="23" y="6" width="2" height="15" rx="1" fill="#e2e8f0"/>
  <circle cx="24" cy="5" r="2" fill="#f6e05e"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="1" fill="#fff"/>
  <rect x="17" y="7" width="2" height="1" fill="#fff"/>
  <!-- Legs -->
  <rect x="12" y="24" width="4" height="5" rx="1" fill="#4a5568"/>
  <rect x="18" y="24" width="4" height="5" rx="1" fill="#4a5568"/>
  <!-- Boots -->
  <rect x="11" y="27" width="5" height="3" rx="1" fill="#2d3748"/>
  <rect x="18" y="27" width="5" height="3" rx="1" fill="#2d3748"/>
</svg>