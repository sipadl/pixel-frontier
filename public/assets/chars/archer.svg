<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Archer body -->
  <rect x="10" y="10" width="12" height="14" rx="2" fill="#276749"/>
  <rect x="11" y="12" width="10" height="8" rx="1" fill="#38a169"/>
  <!-- Head -->
  <rect x="11" y="4" width="10" height="8" rx="3" fill="#ecc094"/>
  <!-- Hood -->
  <rect x="10" y="3" width="12" height="5" rx="3" fill="#276749"/>
  <rect x="12" y="2" width="8" height="4" rx="2" fill="#38a169"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="1" fill="#fff"/>
  <rect x="17" y="7" width="2" height="1" fill="#fff"/>
  <!-- Bow -->
  <path d="M3,8 Q2,16 3,24" fill="none" stroke="#a0aec0" stroke-width="1.5"/>
  <line x1="3" y1="8" x2="3" y2="24" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Arrow -->
  <line x1="3" y1="16" x2="8" y2="16" stroke="#e2e8f0" stroke-width="1"/>
  <polygon points="8,15 10,16 8,17" fill="#e2e8f0"/>
  <!-- Quiver -->
  <rect x="22" y="10" width="3" height="8" rx="1" fill="#744210"/>
  <line x1="23" y1="10" x2="22" y2="6" stroke="#a0aec0" stroke-width="0.8"/>
  <line x1="24" y1="10" x2="24" y2="5" stroke="#a0aec0" stroke-width="0.8"/>
  <!-- Legs -->
  <rect x="12" y="24" width="4" height="5" rx="1" fill="#276749"/>
  <rect x="18" y="24" width="4" height="5" rx="1" fill="#276749"/>
  <rect x="11" y="27" width="5" height="3" rx="1" fill="#2d3748"/>
  <rect x="18" y="27" width="5" height="3" rx="1" fill="#2d3748"/>
</svg>